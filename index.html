<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Site</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 80%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #000; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Enter Password</h2>
        <input type="password" id="passInput" placeholder="Password...">
        <br>
        <button onclick="checkPassword()">Submit</button>
        <p id="error" style="color:red; display:none;">Wrong password!</p>
    </div>

    <script>
        function checkPassword() {
            const userInput = document.getElementById('passInput').value;
            
            // CHOOSE YOUR PASSWORD HERE
            if (userInput === "philo1411") {
                // Redirects to your hidden page
                window.location.href = "jejj.html";
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
